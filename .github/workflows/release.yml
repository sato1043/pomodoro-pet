name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-alpha.*'
      - 'v*.*.*-beta.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Determine release channel from tag
        id: channel
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-alpha.* ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-beta.* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Release channel: $(cat "$GITHUB_OUTPUT" | head -1)"

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ASSETS_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Use bash for npm scripts
        run: npm config set script-shell "C:\Program Files\Git\bin\bash.exe"

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        shell: bash
        run: |
          echo "VITE_HEARTBEAT_URL=${{ secrets.VITE_HEARTBEAT_URL }}" > .env.production
          echo "VITE_STORE_URL=${{ secrets.VITE_STORE_URL }}" >> .env.production
          echo "VITE_RELEASE_CHANNEL=${{ steps.channel.outputs.channel }}" >> .env.production

      - name: Build and package
        run: npm run package

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          generate_release_notes: true
          prerelease: ${{ steps.channel.outputs.prerelease == 'true' }}

      - name: Install butler
        uses: jdno/setup-butler@v1

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          butler push "release/Pomodoro Pet Setup ${VERSION}.exe" updaterllc/pomodoropet:windows --userversion "$VERSION"
